name: RWA Passport TestFlight

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rwa-passport-testflight
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build and upload iOS
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build native iOS web assets
        run: |
          npm ci
          npm run build && npx cap sync ios

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Prepare App Store Connect key
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
        run: |
          KEY_DIRECTORY="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIRECTORY"
          KEY_PATH="$KEY_DIRECTORY/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          KEY_PATH="$KEY_PATH" python3 -c 'import base64, os, pathlib; pathlib.Path(os.environ["KEY_PATH"]).write_bytes(base64.b64decode(os.environ["APP_STORE_CONNECT_PRIVATE_KEY_BASE64"]))'
          chmod 600 "$KEY_PATH"
          echo "APP_STORE_CONNECT_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Install iOS signing assets
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/rwa-passport-distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/rwa-passport-app-store.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/rwa-passport-profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/rwa-passport-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          CERTIFICATE_PATH="$CERTIFICATE_PATH" PROFILE_PATH="$PROFILE_PATH" python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERTIFICATE_PATH"]).write_bytes(
              base64.b64decode(os.environ["IOS_DISTRIBUTION_CERTIFICATE_BASE64"])
          )
          Path(os.environ["PROFILE_PATH"]).write_bytes(
              base64.b64decode(os.environ["IOS_PROVISIONING_PROFILE_BASE64"])
          )
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          IOS_PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")"
          IOS_PROFILE_DESTINATION="$HOME/Library/MobileDevice/Provisioning Profiles/$IOS_PROFILE_UUID.mobileprovision"
          mkdir -p "$(dirname "$IOS_PROFILE_DESTINATION")"
          cp "$PROFILE_PATH" "$IOS_PROFILE_DESTINATION"

          echo "IOS_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "IOS_PROFILE_DESTINATION=$IOS_PROFILE_DESTINATION" >> "$GITHUB_ENV"
          echo "IOS_PROFILE_UUID=$IOS_PROFILE_UUID" >> "$GITHUB_ENV"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      - name: Archive signed iOS app
        run: |
          xcodebuild clean archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/RWAPassport.xcarchive" \
            DEVELOPMENT_TEAM=PTFKU347TU \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROFILE_UUID" \
            PRODUCT_BUNDLE_IDENTIFIER=com.rwaactivated.passport \
            MARKETING_VERSION=1.0 \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}"

      - name: Upload archive to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.rwaactivated.passport</key>
              <string>RWA Passport App Store</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>PTFKU347TU</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/RWAPassport.xcarchive" \
            -exportPath "$RUNNER_TEMP/RWAPassportExport" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

          xcrun altool --upload-app \
            --file "$RUNNER_TEMP/RWAPassportExport/App.ipa" \
            --type ios \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --output-format json

      - name: Remove signing credentials
        if: always()
        run: |
          rm -f "$APP_STORE_CONNECT_KEY_PATH"
          rm -f "$RUNNER_TEMP/rwa-passport-distribution.p12"
          rm -f "$RUNNER_TEMP/rwa-passport-app-store.mobileprovision"
          rm -f "$RUNNER_TEMP/rwa-passport-profile.plist"
          if [[ -n "${IOS_PROFILE_DESTINATION:-}" ]]; then
            rm -f "$IOS_PROFILE_DESTINATION"
          fi
          if [[ -n "${IOS_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$IOS_KEYCHAIN_PATH"
          fi
